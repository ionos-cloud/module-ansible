- hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars.yml

  tasks:
    - name: Install specified python requirements
      pip:
        name: https://test-files.pythonhosted.org/packages/89/06/d481f1e13f59ddd83eeea2df70eb53ee844e73ec7ebb0161878245cfb729/ionoscloud-6.0.0b5.tar.gz

    - name: Create datacenter
      datacenter:
        name: "{{ datacenter }}"
        description: "{{ description }}"
        location: de/fra
      register: datacenter_response

    - name: Debug - Show Datacenter
      debug:
        msg: "{{ datacenter_response }}"

    - name: Update datacenter
      datacenter:
        id: "{{ datacenter_response.datacenter.id }}"
        name: "{{ datacenter }}"
        description: "{{ description }} - RENAMED"
        state: update
      register: updated_datacenter

    - name: Debug - Show Updated Datacenter
      debug:
        msg: "{{ updated_datacenter }}"

    - name: Remove datacenter
      datacenter:
        id: "{{ datacenter_response.datacenter.id }}"
        name: "{{ datacenter }}"
        state: absent
      register: deleted_datacenter

    - name: Debug - Show Deleted Datacenter
      debug:
        msg: "{{ deleted_datacenter }}"