- hosts: localhost
  connection: local
  gather_facts: false

  vars:
      ssh_public_key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

  vars_files:
    - ./vars.yml

  tasks:
    - name: Create datacenter
      ionoscloudsdk.ionoscloud.datacenter:
        name: "{{ datacenter }}"
        location: "{{ location }}"

    - name: Create volumes
      ionoscloudsdk.ionoscloud.volume:
        datacenter: "{{ datacenter }}"
        name: "{{ name }} %02d"
        disk_type: SSD Premium
        image: "{{ image_alias }}"
        image_password: "{{ password }}"
        count: 2
        size: 20
        availability_zone: AUTO
        cpu_hot_plug: false
        ram_hot_plug: true
        nic_hot_plug: true
        nic_hot_unplug: true
        disc_virtio_hot_plug: true
        disc_virtio_hot_unplug: true
        wait_timeout: 600
        wait: true
        state: present
      register: volume_create_response

    # The create task above builds the volumes from an image ALIAS ("{{ image_alias }}").
    # The API resolves that alias to a concrete image UUID during provisioning and stores
    # it in properties.image. The idempotency check below must compare against that exact
    # resolved UUID, otherwise volume._should_replace_object sees existing.image != param
    # and demands a replace. A hardcoded UUID drifts whenever the public image is refreshed,
    # so we read the resolved UUID back from the API instead (drift-proof).
    - name: Look up the created volumes to get the API-resolved image UUID
      ionoscloudsdk.ionoscloud.volume_info:
        datacenter: "{{ datacenter }}"
      register: volume_list_after_create

    - name: Capture the resolved image UUID
      set_fact:
        resolved_image: "{{ (volume_list_after_create.volumes | selectattr('properties.name', 'equalto', name ~ ' 01') | first).properties.image }}"

    - name: Create same volumes (Idempotency)
      ionoscloudsdk.ionoscloud.volume:
        datacenter: "{{ datacenter }}"
        name: "{{ name }} %02d"
        disk_type: SSD Premium
        count: 2
        size: 20
        availability_zone: AUTO
        image: "{{ resolved_image }}"
        ram_hot_plug: true
        nic_hot_plug: true
        nic_hot_unplug: true
        disc_virtio_hot_plug: true
        disc_virtio_hot_unplug: true
        allow_replace: False
        wait_timeout: 600
        wait: true
        state: present
      register: volume_create_response_idempotency

    - name: Show response of volumes create (idempotency)
      debug:
        var: volume_create_response

    - name: Show response of volumes create (idempotency)
      debug:
        var: volume_create_response_idempotency

    - name: List Volumes
      ionoscloudsdk.ionoscloud.volume_info:
        datacenter: "{{ datacenter }}"
      register: volume_list_response

    # - name: Print output to file
    #   ansible.builtin.copy:
    #     content: "{{volume_list_response}}"
    #     dest: ../../docs/returned_object_examples/volume_info.json

    - name: Asserting that changed == false for creation of identical volumes
      assert:
        that:
          - volume_create_response_idempotency.changed == false
        msg: "Changed should be false for idempotency create"

    - name: Update no change
      ionoscloudsdk.ionoscloud.volume:
        datacenter: "{{ datacenter }}"
        instance_ids:
          - "{{ name }} 01"
        disk_type: SSD Premium
        size: 20
        availability_zone: AUTO
        image: "{{ resolved_image }}"
        ram_hot_plug: true
        nic_hot_plug: true
        nic_hot_unplug: true
        disc_virtio_hot_plug: true
        disc_virtio_hot_unplug: true
        allow_replace: False
        wait_timeout: 600
        wait: true
        state: update
      register: volume_create_response_nochange

    - name: Asserting that changed == false for creation of identical volumes
      assert:
        that:
          - volume_create_response_nochange.changed == false
        msg: "Changed should be false for"

    - name: Update volume
      ionoscloudsdk.ionoscloud.volume:
        datacenter: "{{ datacenter }}"
        instance_ids:
          - "{{ name }} 01"
        name: "{{ name }} modified"
        size: 25
        cpu_hot_plug: false
        ram_hot_plug: true
        nic_hot_plug: true
        nic_hot_unplug: true
        disc_virtio_hot_plug: true
        disc_virtio_hot_unplug: true
        allow_replace: False
        wait_timeout: 600
        wait: true
        state: update

    - name: Get all volumes for datacenter
      ionoscloudsdk.ionoscloud.volume_info:
        datacenter: "{{ datacenter }}"
      register: volume_list_response

    - name: Show response of all volumes for datacenter
      debug:
        var: volume_list_response

    - name: Delete volumes
      ionoscloudsdk.ionoscloud.volume:
        datacenter: "{{ datacenter }}"
        instance_ids:
          - "{{ name }} modified"
          - "{{ name }} 02"
        wait_timeout: 600
        state: absent

    - name: Remove datacenter
      ionoscloudsdk.ionoscloud.datacenter:
        datacenter: "{{ datacenter }}"
        state: absent
        wait: true
