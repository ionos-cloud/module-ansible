- hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ./vars.yml

  tasks:
  - name: Create ipblock
    ionoscloudsdk.ionoscloud.ipblock:
      name:  "{{ ipblock_name }}"
      location: "{{ ipblock_location }}"
      size: "{{ ipblock_size }}"
      state: present
    register: ipblock_response

  - name: Create ipblock 2
    ionoscloudsdk.ionoscloud.ipblock:
      name:  "{{ ipblock_name2 }}"
      location: "{{ ipblock_location }}"
      size: "{{ ipblock_size }}"
      state: present
    register: ipblock2_response

  - name: Create Secondary Zone
    ionoscloudsdk.ionoscloud.dns_secondary_zone:
      name: "{{zone_name}}"
      description: "{{zone_description}}"
      primary_ips: "{{ipblock_response.ipblock.properties.ips}}"
    register: zone_response

  - name: Check Create Secondary Zone
    ansible.builtin.assert:
      that:
        - zone_response.secondary_zone.properties.zone_name == zone_name
        - zone_response.secondary_zone.properties.description == zone_description
        - zone_response.secondary_zone.properties.primary_ips | sort == ipblock_response.ipblock.properties.ips | sort
      success_msg: "Secondary zone created successfully"

  # - name: Print output to file
  #   ansible.builtin.copy:
  #     content: "{{zone_response}}"
  #     dest: ../../docs/returned_object_examples/dns_secondary_zone.json

  - name: List Zones
    ionoscloudsdk.ionoscloud.dns_secondary_zone_info:
    register: zones_response

  - name: Check List Zones contains created secondary zone
    ansible.builtin.assert:
      that:
        - zones_response.zones | selectattr('id', 'equalto', zone_response.secondary_zone.id) | list | length == 1
      success_msg: "Created secondary zone found in zones list"

  # - name: Print output to file
  #   ansible.builtin.copy:
  #     content: "{{zones_response}}"
  #     dest: ../../docs/returned_object_examples/dns_secondary_zone_info.json

  - name: Update Zone
    ionoscloudsdk.ionoscloud.dns_secondary_zone:
      secondary_zone: "{{ zone_response.secondary_zone.properties.zone_name }}"
      description: "{{zone_description_updated}}"
      primary_ips: "{{ipblock2_response.ipblock.properties.ips}}"
      allow_replace: False
      state: update
    register: updated_zone_response

  - name: Check Update Zone
    ansible.builtin.assert:
      that:
        - updated_zone_response.secondary_zone.id == zone_response.secondary_zone.id
        - updated_zone_response.secondary_zone.properties.zone_name == zone_name
        - updated_zone_response.secondary_zone.properties.description == zone_description_updated
        - updated_zone_response.secondary_zone.properties.primary_ips | sort == ipblock2_response.ipblock.properties.ips | sort
      success_msg: "Secondary zone updated successfully"

  - name: Update Zone no change
    ionoscloudsdk.ionoscloud.dns_secondary_zone:
      secondary_zone: "{{ zone_response.secondary_zone.properties.zone_name }}"
      description: "{{zone_description_updated}}"
      primary_ips: "{{ipblock2_response.ipblock.properties.ips}}"
      allow_replace: False
      state: update
    register: zone_no_change_response

  - name: Check Update Zone no change
    ansible.builtin.assert:
      that:
        - zone_no_change_response.changed == false
        - zone_no_change_response.secondary_zone.id == zone_response.secondary_zone.id
        - zone_no_change_response.secondary_zone.properties.description == zone_description_updated
        - zone_no_change_response.secondary_zone.properties.primary_ips | sort == ipblock2_response.ipblock.properties.ips | sort
      success_msg: "Secondary zone unchanged as expected"

  - name: Transfer Zone
    ionoscloudsdk.ionoscloud.dns_secondary_zone:
      secondary_zone: "{{ zone_response.secondary_zone.properties.zone_name }}"
      wait: false
      state: transfer

  - name: Delete Zone
    ionoscloudsdk.ionoscloud.dns_secondary_zone:
      secondary_zone: "{{ zone_response.secondary_zone.properties.zone_name }}"
      wait: true
      state: absent

  - name: Delete IpBlock 1
    ionoscloudsdk.ionoscloud.ipblock:
      ipblock: "{{ipblock_response.ipblock.id}}"
      wait: true
      state: absent

  - name: Delete IpBlock 2
    ionoscloudsdk.ionoscloud.ipblock:
      ipblock: "{{ipblock2_response.ipblock.id}}"
      wait: true
      state: absent
